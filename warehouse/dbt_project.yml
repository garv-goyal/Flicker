name: "flicker"
version: "1.0.0"
config-version: 2

profile: "flicker"

model-paths: ["models"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
test-paths: ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  flicker:
    silver:
      +materialized: view
      +schema: silver
    gold:
      +materialized: table
      +schema: gold
